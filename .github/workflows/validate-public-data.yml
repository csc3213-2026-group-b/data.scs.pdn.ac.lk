name: Validate Public Data

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'public/**'
      - '.github/scripts/**'
      - '.github/workflows/validate-public-data.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'wrangler.jsonc'
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - '.github/scripts/**'
      - '.github/workflows/validate-public-data.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'wrangler.jsonc'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  validate-public-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Validate people data
        run: bun run validate:people

      - name: Check formatting
        run: bun run format:check

      - name: Build worker
        run: bunx wrangler build
