name: Auto Merge Public Data PR

on:
  workflow_run:
    workflows:
      - Validate Public Data
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Merge eligible public data PR
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          pr_json="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number,headRefName,headRepository,labels,state \
            --jq '.[0]')"

          if [[ -z "$pr_json" || "$pr_json" == "null" ]]; then
            echo "No open PR found for branch $HEAD_BRANCH; skipping."
            exit 0
          fi

          pr_number="$(echo "$pr_json" | jq -r '.number')"
          state="$(echo "$pr_json" | jq -r '.state')"
          head_ref="$(echo "$pr_json" | jq -r '.headRefName')"
          head_repo="$(echo "$pr_json" | jq -r '.headRepository.nameWithOwner')"
          has_profile_update_label="$(echo "$pr_json" | jq -r 'any(.labels[].name; . == "profile-update")')"
          has_auto_merge_label="$(echo "$pr_json" | jq -r 'any(.labels[].name; . == "auto-merge-profile")')"
          has_project_update_label="$(echo "$pr_json" | jq -r 'any(.labels[].name; . == "project-update")')"
          has_auto_merge_project_label="$(echo "$pr_json" | jq -r 'any(.labels[].name; . == "auto-merge-project")')"

          if [[ "$state" != "OPEN" ]]; then
            echo "PR #$pr_number is not open; skipping."
            exit 0
          fi

          if [[ "$head_repo" != "$GITHUB_REPOSITORY" ]]; then
            echo "PR #$pr_number is not from this repository; skipping."
            exit 0
          fi

          is_profile_pr=false
          is_project_pr=false

          if [[ "$head_ref" == profile/* && "$has_profile_update_label" == "true" && "$has_auto_merge_label" == "true" ]]; then
            is_profile_pr=true
          fi

          if [[ "$head_ref" == project/* && "$has_project_update_label" == "true" && "$has_auto_merge_project_label" == "true" ]]; then
            is_project_pr=true
          fi

          if [[ "$is_profile_pr" != "true" && "$is_project_pr" != "true" ]]; then
            echo "PR #$pr_number is not an eligible profile/* or project/* public data PR; skipping."
            exit 0
          fi

          if [[ "$is_project_pr" == "true" ]]; then
            slug="${head_ref#project/}"
            project_path="public/projects/v1/projects/$slug.json"
            original_head="$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq '.headRefOid')"
            tmp_project="$(mktemp)"

            gh pr checkout "$pr_number" --repo "$GITHUB_REPOSITORY"
            cp "$project_path" "$tmp_project"

            git fetch origin main
            git reset --hard origin/main
            cp "$tmp_project" "$project_path"

            bun install --frozen-lockfile
            bun .github/scripts/reconcile-project-pr.ts "$slug"
            bun run validate:projects

            if ! git diff --quiet "$original_head"; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add public/projects/v1
              git commit -m "Reconcile project data for $slug"
              git push origin "HEAD:$head_ref"
              echo "Updated PR #$pr_number with latest project indexes; waiting for the next validation run."
              exit 0
            fi

            git reset --hard "$original_head"
          fi

          gh pr merge "$pr_number" \
            --repo "$GITHUB_REPOSITORY" \
            --merge \
            --auto \
            --delete-branch
