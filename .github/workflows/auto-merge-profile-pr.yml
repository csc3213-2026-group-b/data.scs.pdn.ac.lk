name: Auto Merge Profile PR

on:
  workflow_run:
    workflows:
      - Validate Public Data
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Merge eligible profile PR
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          pr_json="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number,headRefName,headRepository,labels,state \
            --jq '.[0]')"

          if [[ -z "$pr_json" || "$pr_json" == "null" ]]; then
            echo "No open PR found for branch $HEAD_BRANCH; skipping."
            exit 0
          fi

          pr_number="$(echo "$pr_json" | jq -r '.number')"
          state="$(echo "$pr_json" | jq -r '.state')"
          head_ref="$(echo "$pr_json" | jq -r '.headRefName')"
          head_repo="$(echo "$pr_json" | jq -r '.headRepository.nameWithOwner')"
          has_profile_update_label="$(echo "$pr_json" | jq -r 'any(.labels[].name; . == "profile-update")')"
          has_auto_merge_label="$(echo "$pr_json" | jq -r 'any(.labels[].name; . == "auto-merge-profile")')"

          if [[ "$state" != "OPEN" ]]; then
            echo "PR #$pr_number is not open; skipping."
            exit 0
          fi

          if [[ "$head_repo" != "$GITHUB_REPOSITORY" ]]; then
            echo "PR #$pr_number is not from this repository; skipping."
            exit 0
          fi

          if [[ "$head_ref" != profile/* ]]; then
            echo "PR #$pr_number branch is not profile/*; skipping."
            exit 0
          fi

          if [[ "$has_profile_update_label" != "true" || "$has_auto_merge_label" != "true" ]]; then
            echo "PR #$pr_number does not have the required labels; skipping."
            exit 0
          fi

          gh pr merge "$pr_number" \
            --repo "$GITHUB_REPOSITORY" \
            --merge \
            --auto \
            --delete-branch
